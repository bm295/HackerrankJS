<header class="app-header">
  <div>
    <h1>Sales & Operations Control Center</h1>
    <p>Mini ERP cho SME (Angular 19)</p>
  </div>

  <label>
    Role
    <select [value]="erp.activeRole()" (change)="changeRole($any($event.target).value)">
      @for (role of roles; track role) {
        <option [value]="role">{{ role }}</option>
      }
    </select>
  </label>
</header>

<nav class="main-nav">
  @for (menu of erp.roleMenus(); track menu) {
    <a [routerLink]="'/' + menu" routerLinkActive="active">{{ menu }}</a>
  }
</nav>

<main class="page-content">
  <router-outlet></router-outlet>
</main>
