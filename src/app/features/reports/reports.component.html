<section class="card">
  <h2>Audit trail</h2>
  <ul>
    @for (log of logs(); track log.id) {
      <li>
        <strong>{{ log.actor }}</strong> - {{ log.action }} <code>{{ log.entity }}</code>
        @if (log.before && log.after) {
          <span>({{ log.before }} → {{ log.after }})</span>
        }
        <small>{{ log.at }}</small>
      </li>
    }
  </ul>
</section>
