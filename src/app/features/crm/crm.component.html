<section class="card">
  <h2>CRM Mini</h2>
  <p>Khách hàng Won: <strong>{{ wonCustomers() }}</strong></p>
  <table>
    <tr><th>Khách hàng</th><th>Loại</th><th>Lead status</th><th>Owner</th><th>Last contact</th></tr>
    @for (customer of customers(); track customer.id) {
    <tr>
      <td>{{ customer.name }}</td>
      <td>{{ customer.type }}</td>
      <td><span class="badge">{{ customer.leadStatus }}</span></td>
      <td>{{ customer.owner }}</td>
      <td>{{ customer.lastContactAt }}</td>
    </tr>
    }
  </table>
</section>
